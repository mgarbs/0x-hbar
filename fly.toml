app = "0x-hbar"
primary_region = "ord"
kill_signal = "SIGTERM"
kill_timeout = 10

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  API_PORT = "3001"
  HEDERA_NETWORK = "testnet"
  HEDERA_MIRROR_BASE = "https://testnet.mirrornode.hedera.com"
  DETECTOR_POLL_INTERVAL_MS = "500"
  EXECUTOR_CONCURRENCY = "4"
  OPERATOR_FEE_BPS = "200"
  HOLLOW_CREATE_TINYBARS = "50000000"
  NETWORK_FEE_BUDGET_TINYBARS = "100000"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
